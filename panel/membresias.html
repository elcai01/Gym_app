<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresías - Gym Style Life</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Módulo de Membresías</h1>
        <p>Registro y listado de membresías</p>
        <a class="btn-volver" href="index.html">Volver al inicio</a>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Registrar membresía</h2>
            <form id="membresiaForm">
                <div class="grid">
                    <input type="number" id="cliente_id" placeholder="ID Cliente" required>
                    <input type="number" id="plan_id" placeholder="ID Plan" required>
                    <input type="date" id="fecha_inicio" required>
                    <input type="date" id="fecha_fin" required>
                    <input type="text" id="estado" value="ACTIVA" placeholder="Estado" required>
                </div>

                <textarea id="observaciones" placeholder="Observaciones"></textarea>
                <button type="submit">Guardar membresía</button>
            </form>

            <div id="mensaje"></div>
        </section>

        <section class="table-section">
            <h2>Membresías registradas</h2>
            <button onclick="cargarMembresias()">Actualizar listado</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente ID</th>
                        <th>Plan ID</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaMembresias"></tbody>
            </table>
        </section>
    </main>

    <script src="membresias.js"></script>
</body>
</html>
