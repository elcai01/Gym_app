<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - Gym Style Life</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Módulo de Pagos</h1>
        <p>Registro y listado de pagos</p>
        <a class="btn-volver" href="index.html">Volver al inicio</a>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Registrar pago</h2>
            <form id="pagoForm">
                <div class="grid">
                    <input type="number" id="cliente_id" placeholder="ID Cliente" required>
                    <input type="number" id="membresia_id" placeholder="ID Membresía">
                    <input type="number" id="valor_pagado" placeholder="Valor pagado" required>
                    <input type="number" id="descuento" placeholder="Descuento" value="0">
                    <input type="number" id="recargo" placeholder="Recargo" value="0">
                    <input type="text" id="metodo_pago" placeholder="Método de pago" value="EFECTIVO" required>
                    <input type="text" id="referencia" placeholder="Referencia">
                </div>

                <textarea id="observaciones" placeholder="Observaciones"></textarea>

                <button type="submit">Guardar pago</button>
            </form>

            <div id="mensaje"></div>
        </section>

        <section class="table-section">
            <h2>Pagos registrados</h2>
            <button onclick="cargarPagos()">Actualizar listado</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente ID</th>
                        <th>Membresía ID</th>
                        <th>Valor</th>
                        <th>Método</th>
                        <th>Referencia</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tablaPagos"></tbody>
            </table>
        </section>
    </main>

    <script src="pagos.js"></script>
</body>
</html>
